<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Тренажёр чтения нот для скрипки — определи ноту на нотном стане.">
  <meta name="theme-color" content="#0a0a1a">
  <title>Тренажёр нот — Чтение нот для скрипки</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- ════════ Главная / Дашборд ════════ -->
  <section id="dashboard" class="screen active">
    <div class="dashboard-content">
      <h1 class="logo">🎻 <span>Тренажёр нот</span></h1>
      <p class="tagline">Чтение нот для скрипки — 1-я позиция</p>

      <div class="stats-cards" id="stats-cards">
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">Тренировок</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">Ответов</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-accuracy">—</div>
          <div class="stat-label">Точность</div>
        </div>
      </div>

      <button class="start-btn" id="start-btn">
        <span>🎼</span> Начать тренировку
      </button>

      <div class="settings-section">
        <button class="settings-toggle" id="settings-toggle">⚙️ Настройки звука</button>
        <div class="settings-panel hidden" id="settings-panel">
          <div class="setting-row">
            <label for="vol-slider">Громкость</label>
            <input type="range" id="vol-slider" min="0" max="100" value="70">
            <span class="setting-value" id="vol-value">70%</span>
          </div>
          <div class="setting-row">
            <label for="vibrato-slider">Вибрато</label>
            <input type="range" id="vibrato-slider" min="0" max="10" value="4">
            <span class="setting-value" id="vibrato-value">4</span>
          </div>
          <div class="setting-row">
            <label for="bright-slider">Яркость</label>
            <input type="range" id="bright-slider" min="0" max="100" value="60">
            <span class="setting-value" id="bright-value">60%</span>
          </div>
          <div class="setting-row">
            <label for="dur-slider">Длительность</label>
            <input type="range" id="dur-slider" min="5" max="30" value="15">
            <span class="setting-value" id="dur-value">1.5с</span>
          </div>

          <h4 class="settings-subhead">Тембр</h4>

          <div class="setting-row">
            <label for="detune-slider">Расстройка</label>
            <input type="range" id="detune-slider" min="0" max="50" value="8">
            <span class="setting-value" id="detune-value">0.8</span>
          </div>
          <div class="setting-row">
            <label for="body1-slider">Низ (450Гц)</label>
            <input type="range" id="body1-slider" min="0" max="100" value="40">
            <span class="setting-value" id="body1-value">4.0</span>
          </div>
          <div class="setting-row">
            <label for="body2-slider">Середина (550Гц)</label>
            <input type="range" id="body2-slider" min="0" max="100" value="30">
            <span class="setting-value" id="body2-value">3.0</span>
          </div>
          <div class="setting-row">
            <label for="body3-slider">Верх (2.5кГц)</label>
            <input type="range" id="body3-slider" min="0" max="100" value="20">
            <span class="setting-value" id="body3-value">2.0</span>
          </div>
          <div class="setting-row">
            <label for="filterq-slider">Резонанс</label>
            <input type="range" id="filterq-slider" min="1" max="50" value="7">
            <span class="setting-value" id="filterq-value">0.7</span>
          </div>
          <div class="setting-row">
            <label for="attack-slider">Атака</label>
            <input type="range" id="attack-slider" min="2" max="40" value="15">
            <span class="setting-value" id="attack-value">150мс</span>
          </div>

          <button class="test-btn" id="test-btn">🔊 Тест (Ля4)</button>
        </div>
      </div>

      <div class="session-history" id="session-history">
        <h3>История тренировок</h3>
        <div class="history-table-wrap">
          <table class="history-table" id="history-table">
            <thead>
              <tr>
                <th>Дата</th>
                <th>Ответы</th>
                <th>Верных</th>
                <th>Точность</th>
              </tr>
            </thead>
            <tbody id="history-body"></tbody>
          </table>
        </div>
        <p class="empty-state hidden" id="empty-state">Пока нет тренировок. Начни первую!</p>
      </div>
    </div>
  </section>

  <!-- ════════ Тренировка ════════ -->
  <section id="practice" class="screen">
    <header class="app-header">
      <button class="end-btn" id="end-btn" aria-label="Завершить тренировку">✕ Завершить</button>
      <h2>Чтение нот</h2>
      <div class="score-display">
        🔥 <span id="streak">0</span>
      </div>
    </header>

    <div class="main-content">
      <div class="staff-canvas-container">
        <canvas id="staff-canvas" width="360" height="280"></canvas>
      </div>

      <button class="play-ref-btn" id="play-ref-btn" aria-label="Послушать ноту">
        🔊 Послушать
      </button>

      <div class="note-grid" id="note-grid">
        <button class="note-btn" data-note="G">Соль</button>
        <button class="note-btn" data-note="A">Ля</button>
        <button class="note-btn" data-note="B">Си</button>
        <button class="note-btn" data-note="C">До</button>
        <button class="note-btn" data-note="D">Ре</button>
        <button class="note-btn" data-note="E">Ми</button>
        <button class="note-btn" data-note="F">Фа</button>
      </div>

      <div class="feedback hidden" id="feedback">
        <div class="feedback-icon" id="feedback-icon"></div>
        <div class="feedback-text" id="feedback-text"></div>
        <button class="next-btn" id="next-btn">Следующая нота →</button>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>

</html>
